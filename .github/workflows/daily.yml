name: Daily Founder Notes (with images)

on:
  schedule:
    # 全年 7am Pacific Time（DST 感知，近似）
    - cron: '0 14 * 3-10 *'      # PDT 月份（3-10 月）：14:00 UTC = 7am PDT
    - cron: '0 15 * 11,12,1,2 *' # PST 月份（11,12,1,2 月）：15:00 UTC = 7am PST
  workflow_dispatch:  # 也可以在 GitHub Actions 页面手动触发

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script deps
        working-directory: ./scripts
        run: npm install

      - name: Install Playwright Chromium
        working-directory: ./scripts
        run: npx playwright install --with-deps chromium

      - name: Run daily pipeline
        working-directory: ./scripts
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          AUTO_THEME: ${{ vars.AUTO_THEME || 'article' }}
        run: node run-daily.mjs
